name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
        working-directory: backend

      - name: Build backend binary with PyInstaller
        run: pyinstaller --onefile --name mrpack-installer api.py
        working-directory: backend

      - name: Copy backend binary to frontend/api
        run: |
          mkdir -p frontend/api
          cp backend/dist/mrpack-installer frontend/api/mrpack-installer

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Linux package
        run: npm run build:linux
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate AppImage artifact
        id: appimage
        run: |
          APPIMAGE_PATH=$(find frontend/release -type f -name "*.AppImage" | head -n 1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "No .AppImage artifact found in frontend/release"
            exit 1
          fi
          echo "path=$APPIMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.appimage.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
        working-directory: backend

      - name: Build backend binary with PyInstaller
        run: pyinstaller --onefile --name mrpack-installer api.py
        working-directory: backend

      - name: Copy backend binary to frontend/api
        run: |
          mkdir -p frontend/api
          cp backend/dist/mrpack-installer.exe frontend/api/mrpack-installer.exe

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Windows package
        run: npm run build:win
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename installer files
        working-directory: frontend/release
        run: |
          for file in *" "*; do
            if [ -f "$file" ]; then
              mv "$file" "${file// /-}"
            fi
          done

      - name: Create GitHub Release and upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/Mrpack-Installer-Setup-*.exe
            frontend/release/Mrpack-Installer-Setup-*.exe.blockmap
            frontend/release/latest.yml
          fail_on_unmatched_files: true